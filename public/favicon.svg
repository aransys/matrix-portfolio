<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f2113" />
      <stop offset="1" stop-color="#030805" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.6" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded "terminal window" background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)" />
  <rect width="64" height="64" rx="12" fill="none" stroke="#00ff41" stroke-opacity="0.18" stroke-width="1" />

  <!-- Subtle scanlines -->
  <g stroke="#00ff41" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="14" x2="64" y2="14" />
    <line x1="0" y1="26" x2="64" y2="26" />
    <line x1="0" y1="38" x2="64" y2="38" />
    <line x1="0" y1="50" x2="64" y2="50" />
  </g>

  <!--  >_  prompt, centered -->
  <g filter="url(#glow)">
    <polyline
      points="18,22 32,32 18,42"
      fill="none"
      stroke="#00ff41"
      stroke-width="7"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <rect x="38" y="41" width="14" height="7" rx="1.5" fill="#33ff77" />
  </g>
</svg>
